<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registro Prenotazione Campi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:#ece7de;padding:24px;min-height:100vh}
.page{max-width:1600px;margin:0 auto;background:#fbf9f5;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.14);padding:28px 32px 24px}
.header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #1a3a5c;padding-bottom:14px;margin-bottom:18px;flex-wrap:wrap;gap:12px}
.title{font-family:'Cormorant Garamond',serif;font-size:26px;color:#1a3a5c;font-weight:700}
.subtitle{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8c8ca4;margin-top:3px}
.meta{display:flex;gap:20px;align-items:flex-end;flex-wrap:wrap}
.meta-box{display:flex;flex-direction:column;gap:4px}
.meta-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#8c8ca4;font-weight:700}
.meta-input{border:none;border-bottom:1.5px solid #1a3a5c;background:transparent;font-family:'Manrope',sans-serif;font-size:13px;color:#1a3a5c;outline:none;width:120px;padding:2px 0}
.meta-input:focus{border-bottom-width:2px}
.btn-group{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.btn-save{padding:10px 20px;background:#1a3a5c;color:#fff;border:none;border-radius:6px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-save:hover{background:#142d47}
.btn-save:disabled{background:#aaa;cursor:not-allowed}
.btn-secondary{padding:10px 16px;background:transparent;color:#1a3a5c;border:2px solid #1a3a5c;border-radius:6px;font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-secondary:hover{background:#1a3a5c;color:#fff}
.btn-print{padding:10px 16px;background:transparent;color:#6c757d;border:2px solid #6c757d;border-radius:6px;font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-print:hover{background:#6c757d;color:#fff}
.status{font-size:11px;padding:4px 10px;border-radius:4px;font-weight:600;letter-spacing:.04em;white-space:nowrap}
.status.idle{background:#e9ecef;color:#495057}
.status.saving{background:#fff3cd;color:#856404}
.status.saved{background:#d1e7dd;color:#0a3622}
.status.error{background:#f8d7da;color:#842029}
.tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.tab-btn{padding:8px 20px;border:2px solid transparent;border-radius:6px;font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;background:#fff;transition:all .15s;position:relative}
.tab-btn .slot-count{font-size:10px;font-weight:600;margin-left:6px;padding:1px 6px;border-radius:10px;background:rgba(0,0,0,.08)}
.tab-btn.padel{color:#1a3a5c;border-color:#1a3a5c44}
.tab-btn.tennis{color:#2d7d32;border-color:#2d7d3244}
.tab-btn.calcio{color:#e65100;border-color:#e6510044}
.tab-btn.active.padel{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.tab-btn.active.tennis{background:#2d7d32;color:#fff;border-color:#2d7d32}
.tab-btn.active.calcio{background:#e65100;color:#fff;border-color:#e65100}
.tab-btn.active .slot-count{background:rgba(255,255,255,.25);color:#fff}
.campo-view{display:none}.campo-view.active{display:block}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{padding:10px 8px;text-align:center;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid rgba(0,0,0,.12);white-space:nowrap}
thead th.time-th{width:80px;background:#1a3a5c;color:#fff;border-radius:6px 0 0 0}
thead th.day-th{font-size:13px;vertical-align:middle}
thead th.weekend{background:rgba(0,0,0,.03)}
.dhi{display:flex;flex-direction:column;align-items:center;gap:5px;padding:4px 0}
.dnl{font-size:13px;font-weight:700;color:#1a3a5c}
.ddd{font-size:12px;font-weight:600;color:#1a3a5c;background:rgba(26,58,92,.07);border-radius:4px;padding:2px 8px;min-width:64px;text-align:center;min-height:20px}
thead th.weekend .ddd{background:rgba(26,58,92,.1)}
tbody tr{border-bottom:1.5px solid rgba(26,58,92,.28)}
tbody tr:hover td{background:rgba(26,58,92,.04)!important}
tbody td{padding:0;height:100px;border-right:1px solid rgba(26,58,92,.08);vertical-align:top}
tbody td:last-child{border-right:none}
tbody td.time-td{background:#e8edf5;border-right:2px solid rgba(26,58,92,.2);text-align:center;vertical-align:middle}
tbody tr:nth-child(even) td:not(.time-td){background:rgba(26,58,92,.02)}
tbody tr:nth-child(odd) td:not(.time-td){background:#fbf9f5}
tbody td.weekend-td{background:rgba(26,58,92,.04)!important}
tbody td.booked{background:rgba(26,58,92,.08)!important;border-left:3px solid #1a3a5c}
tbody td.booked.tennis{background:rgba(45,125,50,.08)!important;border-left-color:#2d7d32}
tbody td.booked.calcio{background:rgba(230,81,0,.08)!important;border-left-color:#e65100}
.om{font-family:'Cormorant Garamond',serif;font-size:20px;color:#1a3a5c;font-weight:700;display:block}
.oe{font-size:11px;color:#8c8ca4;display:block;margin-top:1px}
.cell{padding:6px 8px;height:100%;display:flex;flex-direction:column;gap:4px}
.field{display:flex;flex-direction:column;gap:1px}
.fl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#aaa;font-weight:700}
.fi{border:none;border-bottom:1px solid rgba(26,58,92,.2);background:transparent;font-family:'Manrope',sans-serif;font-size:12px;color:#1a3a5c;outline:none;width:100%;padding:1px 0}
.fi.tennis{border-bottom-color:rgba(45,125,50,.35)}
.fi.calcio{border-bottom-color:rgba(230,81,0,.35)}
.fi:focus{border-bottom-width:2px}
.footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(26,58,92,.12);padding-top:12px;margin-top:20px;font-size:10px;color:#aaa;letter-spacing:.05em;flex-wrap:wrap;gap:8px}
.footer-stats{display:flex;gap:16px}
.stat-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;background:#e8edf5;color:#1a3a5c}
.stat-badge.tennis{background:#e8f5e9;color:#2d7d32}
.stat-badge.calcio{background:#fff3e0;color:#e65100}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.success{background:#d1e7dd;color:#0a3622;border:1px solid #a3cfbb}
.toast.error{background:#f8d7da;color:#842029;border:1px solid #f1aeb5}
@media print{
  .btn-group,.tabs,.footer{display:none}
  .campo-view{display:block!important}
  .page{box-shadow:none;padding:10px}
  tbody td{height:70px}
}
</style>
</head>
<body>
<div class="page">
<div class="header">
  <div>
    <div class="title">Registro Prenotazione Campi</div>
    <div class="subtitle" id="subtitle-text">Padel 1 &amp; 2 &nbsp;&middot;&nbsp; Tennis 1 &amp; 2 &nbsp;&middot;&nbsp; Calcio &mdash; Settimanale</div>
  </div>
  <div class="meta">
    <div class="meta-box"><span class="meta-label">Dal (Lunedì)</span><input class="meta-input" id="date-from" type="text" placeholder="gg/mm/aaaa" autocomplete="off"></div>
    <div class="meta-box"><span class="meta-label">Al (Domenica)</span><input class="meta-input" id="date-to" type="text" placeholder="gg/mm/aaaa" autocomplete="off" readonly></div>
    <div class="meta-box"><span class="meta-label">Responsabile</span><input class="meta-input" id="responsabile" type="text" placeholder="Nome..."></div>
    <div class="meta-box"><span class="meta-label">Stato</span><span class="status idle" id="status-bar">Pronto</span></div>
    <div class="btn-group">
      <button class="btn-secondary" onclick="loadPrevWeek()">&#8592; Settimana Prec.</button>
      <button class="btn-print" onclick="window.print()">&#128438; Stampa</button>
      <button class="btn-save" id="btn-save" onclick="saveAll()">&#128190; Salva Settimana</button>
    </div>
  </div>
</div>
<div class="tabs">
  <button class="tab-btn padel active" id="tab-padel1" onclick="showCampo('padel1')">&#127955; Padel 1 <span class="slot-count" id="count-padel1">0/11</span></button>
  <button class="tab-btn padel" id="tab-padel2" onclick="showCampo('padel2')">&#127955; Padel 2 <span class="slot-count" id="count-padel2">0/11</span></button>
  <button class="tab-btn tennis" id="tab-tennis1" onclick="showCampo('tennis1')">&#127914; Tennis 1 <span class="slot-count" id="count-tennis1">0/11</span></button>
  <button class="tab-btn tennis" id="tab-tennis2" onclick="showCampo('tennis2')">&#127914; Tennis 2 <span class="slot-count" id="count-tennis2">0/11</span></button>
  <button class="tab-btn calcio" id="tab-calcio" onclick="showCampo('calcio')">&#9917; Calcio <span class="slot-count" id="count-calcio">0/11</span></button>
</div>

<div id="views-container"></div>

<div class="footer">
  <span>Registro Prenotazioni &nbsp;<span style="color:#c9a84c">&#9679;</span>&nbsp; Aggiornato automaticamente al salvataggio</span>
  <div class="footer-stats">
    <span class="stat-badge" id="stat-padel">Padel: 0 slot</span>
    <span class="stat-badge tennis" id="stat-tennis">Tennis: 0 slot</span>
    <span class="stat-badge calcio" id="stat-calcio">Calcio: 0 slot</span>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIGURAZIONE ─────────────────────────────────────────────────────────────
const CAMPI = ['padel1','padel2','tennis1','tennis2','calcio'];
const SPORT_TYPE = {padel1:'padel',padel2:'padel',tennis1:'tennis',tennis2:'tennis',calcio:'calcio'};
const SLOTS = ['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'];
const SLOT_ENDS = {'08:00':'09:00','09:00':'10:00','10:00':'11:00','11:00':'12:00','12:00':'13:00','13:00':'14:00','14:00':'15:00','15:00':'16:00','16:00':'17:00','17:00':'18:00','18:00':'19:00','19:00':'20:00','20:00':'21:00'};
const DAYS = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];
const WEEKEND_DAYS = [5,6];

// ── GENERAZIONE HTML TABELLE ───────────────────────────────────────────────────
function buildTables() {
  const container = document.getElementById('views-container');
  CAMPI.forEach((campo, ci) => {
    const sport = SPORT_TYPE[campo];
    const colorClass = sport === 'padel' ? '' : sport;
    const div = document.createElement('div');
    div.className = 'campo-view' + (ci === 0 ? ' active' : '');
    div.id = 'view-' + campo;

    let thead = `<thead><tr><th class="time-th">Orario</th>`;
    DAYS.forEach((d,i) => {
      const wk = WEEKEND_DAYS.includes(i) ? ' weekend' : '';
      thead += `<th class="day-th${wk}"><div class="dhi"><span class="dnl">${d}</span><span class="ddd" data-day-offset="${i}">—</span></div></th>`;
    });
    thead += `</tr></thead>`;

    let tbody = `<tbody>`;
    SLOTS.forEach(slot => {
      tbody += `<tr><td class="time-td"><span class="om">${slot}</span><span class="oe">↓ ${SLOT_ENDS[slot]}</span></td>`;
      DAYS.forEach((d,di) => {
        const wkClass = WEEKEND_DAYS.includes(di) ? ' weekend-td' : '';
        tbody += `<td class="${wkClass}" id="td-${campo}-${slot.replace(':','')}-${di}">
          <div class="cell" data-campo="${campo}" data-slot="${slot}" data-day="${di}">
            <div class="field"><span class="fl">Nome</span><input class="fi ${colorClass} fi-nome" type="text" placeholder="—" autocomplete="off" data-field="nome"></div>
            <div class="field"><span class="fl">Telefono</span><input class="fi ${colorClass} fi-tel" type="tel" placeholder="—" autocomplete="off" data-field="tel"></div>
            <div class="field"><span class="fl">Istruttore</span><input class="fi ${colorClass} fi-istr" type="text" placeholder="—" autocomplete="off" data-field="istr"></div>
          </div>
        </td>`;
      });
      tbody += `</tr>`;
    });
    tbody += `</tbody>`;

    div.innerHTML = `<table>${thead}${tbody}</table>`;
    container.appendChild(div);
  });

  // Attacca listener su tutti gli input per aggiornamento live
  document.querySelectorAll('.fi').forEach(inp => {
    inp.addEventListener('input', () => {
      updateCellColor(inp.closest('.cell'));
      updateCounters();
    });
  });
}

// ── TAB SWITCHING ──────────────────────────────────────────────────────────────
function showCampo(campo) {
  document.querySelectorAll('.campo-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + campo).classList.add('active');
  document.getElementById('tab-' + campo).classList.add('active');
}

// ── COLORAZIONE CELLE ──────────────────────────────────────────────────────────
function updateCellColor(cell) {
  if (!cell) return;
  const td = cell.closest('td');
  if (!td) return;
  const campo = cell.dataset.campo;
  const sport = SPORT_TYPE[campo];
  const nome = cell.querySelector('.fi-nome')?.value?.trim();
  td.classList.remove('booked','tennis','calcio');
  if (nome) {
    td.classList.add('booked');
    if (sport !== 'padel') td.classList.add(sport);
  }
}

// ── CONTATORI SLOT ─────────────────────────────────────────────────────────────
function updateCounters() {
  const totalSlots = SLOTS.length * DAYS.length; // 13 * 7 = 91
  const counts = {padel1:0,padel2:0,tennis1:0,tennis2:0,calcio:0};
  document.querySelectorAll('.cell').forEach(cell => {
    const nome = cell.querySelector('.fi-nome')?.value?.trim();
    if (nome) counts[cell.dataset.campo]++;
  });

  CAMPI.forEach(c => {
    const el = document.getElementById('count-' + c);
    if (el) el.textContent = `${counts[c]}/${SLOTS.length * 7}`;
  });

  const padelTotal = counts.padel1 + counts.padel2;
  const tennisTotal = counts.tennis1 + counts.tennis2;
  document.getElementById('stat-padel').textContent = `Padel: ${padelTotal} slot`;
  document.getElementById('stat-tennis').textContent = `Tennis: ${tennisTotal} slot`;
  document.getElementById('stat-calcio').textContent = `Calcio: ${counts.calcio} slot`;
}

// ── DATE DINAMICHE ─────────────────────────────────────────────────────────────
function parseDate(str) {
  const parts = str.split('/');
  if (parts.length !== 3) return null;
  const d = parseInt(parts[0]), m = parseInt(parts[1])-1, y = parseInt(parts[2]);
  const dt = new Date(y,m,d);
  return isNaN(dt.getTime()) ? null : dt;
}
function formatDate(dt) {
  return dt.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function formatShort(dt) {
  return dt.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});
}

function updateDates() {
  const fromStr = document.getElementById('date-from').value.trim();
  const from = parseDate(fromStr);
  if (!from) {
    document.querySelectorAll('[data-day-offset]').forEach(el => el.textContent = '—');
    document.getElementById('date-to').value = '';
    return;
  }
  // Calcola domenica
  const sun = new Date(from);
  sun.setDate(from.getDate() + 6);
  document.getElementById('date-to').value = formatDate(sun);

  // Aggiorna tutti gli header delle date
  document.querySelectorAll('[data-day-offset]').forEach(el => {
    const offset = parseInt(el.dataset.dayOffset);
    const d = new Date(from);
    d.setDate(from.getDate() + offset);
    el.textContent = formatShort(d);
  });
}

document.getElementById('date-from').addEventListener('input', updateDates);

// ── CHIAVE STORAGE ─────────────────────────────────────────────────────────────
function storageKey() {
  const from = document.getElementById('date-from').value.trim();
  return from ? `registro_campi_${from.replace(/\//g,'_')}` : null;
}

// ── SALVATAGGIO ────────────────────────────────────────────────────────────────
function saveAll() {
  const key = storageKey();
  if (!key) {
    showToast('⚠️ Inserisci prima la data di inizio settimana', 'error');
    return;
  }

  const btn = document.getElementById('btn-save');
  const bar = document.getElementById('status-bar');
  btn.disabled = true;
  bar.className = 'status saving';
  bar.textContent = 'Salvataggio...';

  try {
    const data = {
      meta: {
        dateFrom: document.getElementById('date-from').value,
        dateTo: document.getElementById('date-to').value,
        responsabile: document.getElementById('responsabile').value,
        savedAt: new Date().toISOString()
      },
      slots: {}
    };

    document.querySelectorAll('.cell').forEach(cell => {
      const campo = cell.dataset.campo;
      const slot = cell.dataset.slot;
      const day = cell.dataset.day;
      const k = `${campo}_${slot}_${day}`;
      data.slots[k] = {
        nome: cell.querySelector('.fi-nome')?.value || '',
        tel: cell.querySelector('.fi-tel')?.value || '',
        istr: cell.querySelector('.fi-istr')?.value || ''
      };
    });

    localStorage.setItem(key, JSON.stringify(data));

    // Salva anche indice settimane
    const index = JSON.parse(localStorage.getItem('registro_index') || '[]');
    if (!index.includes(key)) {
      index.unshift(key);
      if (index.length > 52) index.pop(); // max 1 anno
      localStorage.setItem('registro_index', JSON.stringify(index));
    }

    bar.className = 'status saved';
    bar.textContent = '✓ Salvato';
    showToast('✅ Settimana salvata correttamente!', 'success');
    setTimeout(() => { bar.className = 'status idle'; bar.textContent = 'Pronto'; }, 3000);
  } catch(e) {
    bar.className = 'status error';
    bar.textContent = 'Errore!';
    showToast('❌ Errore nel salvataggio: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ── CARICAMENTO DATI ───────────────────────────────────────────────────────────
function loadData(key) {
  const raw = localStorage.getItem(key);
  if (!raw) return false;
  try {
    const data = JSON.parse(raw);
    if (data.meta) {
      document.getElementById('date-from').value = data.meta.dateFrom || '';
      document.getElementById('responsabile').value = data.meta.responsabile || '';
      updateDates();
    }
    if (data.slots) {
      Object.entries(data.slots).forEach(([k, v]) => {
        const parts = k.split('_');
        // key format: campo_HH:MM_day
        // campo can have underscore? No. So: parts[0]=campo, parts[1]=slot, parts[2]=day
        const campo = parts[0];
        const slot = parts[1];
        const day = parts[2];
        const cell = document.querySelector(`.cell[data-campo="${campo}"][data-slot="${slot}"][data-day="${day}"]`);
        if (cell) {
          if (v.nome) cell.querySelector('.fi-nome').value = v.nome;
          if (v.tel) cell.querySelector('.fi-tel').value = v.tel;
          if (v.istr) cell.querySelector('.fi-istr').value = v.istr;
          updateCellColor(cell);
        }
      });
    }
    updateCounters();
    return true;
  } catch(e) {
    console.error('Errore caricamento:', e);
    return false;
  }
}

// ── CARICA SETTIMANA PRECEDENTE ────────────────────────────────────────────────
function loadPrevWeek() {
  const index = JSON.parse(localStorage.getItem('registro_index') || '[]');
  const currentKey = storageKey();

  if (index.length === 0) {
    showToast('ℹ️ Nessuna settimana salvata trovata', 'error');
    return;
  }

  // Trova la settimana precedente alla corrente
  let targetKey = null;
  if (!currentKey) {
    targetKey = index[0];
  } else {
    const idx = index.indexOf(currentKey);
    if (idx === -1) {
      targetKey = index[0];
    } else if (idx + 1 < index.length) {
      targetKey = index[idx + 1];
    } else {
      showToast('ℹ️ Nessuna settimana precedente disponibile', 'error');
      return;
    }
  }

  // Pulisci tutti gli input prima
  clearAll(false);
  const ok = loadData(targetKey);
  if (ok) {
    showToast('📂 Settimana precedente caricata!', 'success');
  } else {
    showToast('❌ Impossibile caricare i dati', 'error');
  }
}

// ── PULIZIA ────────────────────────────────────────────────────────────────────
function clearAll(confirm_ask = true) {
  if (confirm_ask && !confirm('Vuoi davvero cancellare tutti i dati della settimana corrente?')) return;
  document.querySelectorAll('.fi').forEach(inp => inp.value = '');
  document.querySelectorAll('td.booked').forEach(td => td.classList.remove('booked','tennis','calcio'));
  updateCounters();
}

// ── TOAST ──────────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── AUTO-SALVATAGGIO (ogni 60s se ci sono dati) ─────────────────────────────────
setInterval(() => {
  const key = storageKey();
  if (!key) return;
  const hasData = [...document.querySelectorAll('.fi-nome')].some(i => i.value.trim());
  if (hasData) {
    saveAll();
    console.log('Auto-salvataggio eseguito');
  }
}, 60000);

// ── INIT ───────────────────────────────────────────────────────────────────────
buildTables();
updateCounters();

// Auto-carica ultima settimana salvata se presente
const index = JSON.parse(localStorage.getItem('registro_index') || '[]');
if (index.length > 0) {
  loadData(index[0]);
  if (document.getElementById('date-from').value) {
    showToast('📂 Ultima settimana caricata automaticamente', 'success');
  }
}
</script>
