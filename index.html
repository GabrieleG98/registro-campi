<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registro Prenotazione Campi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:#ece7de;padding:24px;min-height:100vh}
.page{max-width:1600px;margin:0 auto;background:#fbf9f5;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.14);padding:28px 32px 24px}
.header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #1a3a5c;padding-bottom:14px;margin-bottom:18px}
.title{font-family:'Cormorant Garamond',serif;font-size:26px;color:#1a3a5c;font-weight:700}
.subtitle{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8c8ca4;margin-top:3px}
.meta{display:flex;gap:24px;align-items:flex-end}
.meta-box{display:flex;flex-direction:column;gap:4px}
.meta-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#8c8ca4;font-weight:700}
.meta-input{border:none;border-bottom:1.5px solid #1a3a5c;background:transparent;font-family:'Manrope',sans-serif;font-size:13px;color:#1a3a5c;outline:none;width:120px;padding:2px 0}
.meta-input:focus{border-bottom-width:2px}
.tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.tab-btn{padding:8px 20px;border:2px solid transparent;border-radius:6px;font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;background:#fff;transition:all .15s}
.tab-btn.padel{color:#1a3a5c;border-color:#1a3a5c44}
.tab-btn.tennis{color:#2d7d32;border-color:#2d7d3244}
.tab-btn.calcio{color:#e65100;border-color:#e6510044}
.tab-btn.active.padel{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.tab-btn.active.tennis{background:#2d7d32;color:#fff;border-color:#2d7d32}
.tab-btn.active.calcio{background:#e65100;color:#fff;border-color:#e65100}
.campo-view{display:none}.campo-view.active{display:block}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{padding:10px 8px;text-align:center;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid rgba(0,0,0,.12);white-space:nowrap}
thead th.time-th{width:90px;background:#1a3a5c;color:#fff;border-radius:6px 0 0 0}
thead th.day-th{font-size:13px;vertical-align:middle}
thead th.weekend{background:rgba(0,0,0,.03)}
.dhi{display:flex;flex-direction:column;align-items:center;gap:5px;padding:4px 0}
.dnl{font-size:13px;font-weight:700;color:#1a3a5c}
.ddd{font-size:12px;font-weight:600;color:#1a3a5c;background:rgba(26,58,92,.07);border-radius:4px;padding:2px 8px;min-width:64px;text-align:center;min-height:20px}
thead th.weekend .ddd{background:rgba(26,58,92,.1)}
tbody tr{border-bottom:1.5px solid rgba(26,58,92,.28)}
tbody tr:hover td{background:rgba(26,58,92,.04)!important}
tbody td{padding:0;height:80px;border-right:1px solid rgba(26,58,92,.08);vertical-align:top}
tbody td:last-child{border-right:none}
tbody td.time-td{background:#e8edf5;border-right:2px solid rgba(26,58,92,.2);text-align:center;vertical-align:middle}
tbody tr:nth-child(even) td:not(.time-td){background:rgba(26,58,92,.02)}
tbody tr:nth-child(odd) td:not(.time-td){background:#fbf9f5}
tbody td.weekend-td{background:rgba(26,58,92,.04)!important}
.om{font-family:'Cormorant Garamond',serif;font-size:20px;color:#1a3a5c;font-weight:700;display:block}
.oe{font-size:11px;color:#8c8ca4;display:block;margin-top:1px}
.cell{padding:8px 10px;height:100%;display:flex;flex-direction:column;gap:6px}
.field{display:flex;flex-direction:column;gap:2px}
.fl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#aaa;font-weight:700}
.fi{border:none;border-bottom:1px solid rgba(26,58,92,.2);background:transparent;font-family:'Manrope',sans-serif;font-size:12px;color:#1a3a5c;outline:none;width:100%;padding:1px 0}
.fi.tennis{border-bottom-color:rgba(45,125,50,.35)}
.fi.calcio{border-bottom-color:rgba(230,81,0,.35)}
.fi:focus{border-bottom-width:2px}
.footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(26,58,92,.12);padding-top:12px;margin-top:20px;font-size:10px;color:#aaa;letter-spacing:.05em}
.dot{display:inline-block;width:4px;height:4px;border-radius:50%;background:#c9a84c;opacity:.7;margin:0 5px;vertical-align:middle}
</style>
</head>
<body>
<div class="page">
<div class="header">
  <div>
    <div class="title">Registro Prenotazione Campi</div>
    <div class="subtitle">Padel 1 &amp; 2 &nbsp;&middot;&nbsp; Tennis 1 &amp; 2 &nbsp;&middot;&nbsp; Calcio &mdash; Settimanale</div>
  </div>
  <div class="meta">
    <div class="meta-box"><span class="meta-label">Dal (Luned&igrave;)</span><input class="meta-input" id="date-from" type="text" placeholder="gg/mm/aaaa" autocomplete="off"></div>
    <div class="meta-box"><span class="meta-label">Al (Domenica)</span><input class="meta-input" id="date-to" type="text" placeholder="gg/mm/aaaa" autocomplete="off"></div>
    <div class="meta-box"><span class="meta-label">Responsabile</span><input class="meta-input" type="text" placeholder="Nome..."></div>
  </div>
</div>
<div class="tabs">
  <button class="tab-btn padel active" onclick="showCampo('padel1')">&#127955; Padel 1</button>
  <button class="tab-btn padel" onclick="showCampo('padel2')">&#127955; Padel 2</button>
  <button class="tab-btn tennis" onclick="showCampo('tennis1')">&#127914; Tennis 1</button>
  <button class="tab-btn tennis" onclick="showCampo('tennis2')">&#127914; Tennis 2</button>
  <button class="tab-btn calcio" onclick="showCampo('calcio')">&#9917; Calcio</button>
</div>
PLACEHOLDER_BODY
<div class="footer">
  <span>Centro Sportivo <span class="dot"></span> Registro Prenotazione Campi <span class="dot"></span> Uso digitale</span>
  <span>Padel 1 &amp; 2 &nbsp;&middot;&nbsp; Tennis 1 &amp; 2 &nbsp;&middot;&nbsp; Calcio</span>
</div>
</div>
<script>
function showCampo(id){
  document.querySelectorAll('.campo-view').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  const m={padel1:0,padel2:1,tennis1:2,tennis2:3,calcio:4};
  document.querySelectorAll('.tab-btn')[m[id]].classList.add('active');
}
function parseDate(s){
  const p=s.trim().split('/');
  if(p.length<2)return null;
  const d=parseInt(p[0],10),m=parseInt(p[1],10)-1;
  let y=p[2]?parseInt(p[2],10):new Date().getFullYear();
  if(y<100)y+=2000;
  return isNaN(d)||isNaN(m)?null:new Date(y,m,d);
}
function fmt(dt){return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0');}
function updateDates(){
  const s=parseDate(document.getElementById('date-from').value);
  document.querySelectorAll('[data-day-offset]').forEach(el=>{
    const o=parseInt(el.dataset.dayOffset,10);
    if(s){const d=new Date(s);d.setDate(d.getDate()+o);el.textContent=fmt(d);}
    else el.textContent='—';
  });
}
document.getElementById('date-from').addEventListener('input',updateDates);
</script>
</body>
</html>
