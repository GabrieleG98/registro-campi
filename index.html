<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a3a5c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Campi">
<title>Registro Campi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:'Manrope',sans-serif;
  background:#ece7de;
  min-height:100%;
  min-height:100dvh;
  overflow-x:hidden;
}

/* ── APP SHELL ── */
.app{
  display:flex;
  flex-direction:column;
  min-height:100dvh;
  max-width:1800px;
  margin:0 auto;
}

/* ── TOP HEADER ── */
.topbar{
  background:#1a3a5c;
  color:#fff;
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.2);
  padding-top: max(12px, env(safe-area-inset-top));
}
.topbar-brand{display:flex;flex-direction:column;min-width:0}
.topbar-title{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:700;line-height:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.topbar-sub{
  font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.55);margin-top:2px;
}
.topbar-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.icon-btn{
  width:36px;height:36px;border:none;border-radius:8px;
  background:rgba(255,255,255,.12);color:#fff;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.icon-btn:hover{background:rgba(255,255,255,.22)}
.icon-btn.accent{background:#c9a84c;}
.icon-btn.accent:hover{background:#b5943d}
.icon-btn.danger{background:rgba(220,53,69,.3)}
.icon-btn.danger:hover{background:rgba(220,53,69,.6)}
.status-pill{
  font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;
  white-space:nowrap;
}
.status-pill.idle{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
.status-pill.saving{background:#fff3cd;color:#856404}
.status-pill.saved{background:#d1e7dd;color:#0a3622}
.status-pill.error{background:#f8d7da;color:#842029}
.status-pill.loading{background:rgba(255,255,255,.18);color:#fff}

/* ── WEEK BAR ── */
.weekbar{
  background:#fbf9f5;
  border-bottom:1px solid rgba(26,58,92,.1);
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.week-nav-group{display:flex;align-items:center;gap:6px;flex:1;min-width:200px}
.week-btn{
  width:32px;height:32px;border:1.5px solid rgba(26,58,92,.25);
  border-radius:7px;background:#fff;color:#1a3a5c;
  font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.week-btn:hover{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.week-btn.today-btn{
  background:#c9a84c;color:#fff;border-color:#c9a84c;
  font-size:10px;font-weight:700;width:auto;padding:0 10px;
  letter-spacing:.04em;
}
.week-btn.today-btn:hover{background:#b5943d;border-color:#b5943d}
.week-range{
  font-size:12px;font-weight:700;color:#1a3a5c;
  flex:1;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.week-inputs{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ctrl-group{display:flex;flex-direction:column;gap:2px}
.ctrl-label{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:#8c8ca4;font-weight:700}
.ctrl-input{
  border:none;border-bottom:1.5px solid rgba(26,58,92,.3);
  background:transparent;font-family:'Manrope',sans-serif;
  font-size:13px;color:#1a3a5c;outline:none;
  width:100px;padding:1px 0;
}
.ctrl-input:focus{border-bottom-color:#1a3a5c;border-bottom-width:2px}
.ctrl-input[readonly]{color:#8c8ca4;border-bottom-style:dashed}
.sync-badge{
  font-size:9px;color:#8c8ca4;letter-spacing:.03em;
  white-space:nowrap;
}

/* ── TABS ── */
.tabs-wrap{
  background:#fbf9f5;
  padding:8px 16px 0;
  border-bottom:2px solid rgba(26,58,92,.08);
  overflow-x:auto;
  scrollbar-width:none;
}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{
  display:flex;gap:4px;
  min-width:max-content;
}
.tab-btn{
  padding:8px 14px;
  border:none;border-bottom:3px solid transparent;
  border-radius:0;
  background:transparent;
  font-family:'Manrope',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;color:#8c8ca4;
  display:flex;align-items:center;gap:5px;
  transition:all .15s;white-space:nowrap;
  margin-bottom:-2px;
}
.tab-btn:hover{color:#1a3a5c}
.tab-btn.padel.active{color:#1a3a5c;border-bottom-color:#1a3a5c}
.tab-btn.tennis.active{color:#2d7d32;border-bottom-color:#2d7d32}
.tab-btn.calcio.active{color:#c84b00;border-bottom-color:#c84b00}
.badge{
  font-size:9px;font-weight:700;padding:1px 6px;
  border-radius:10px;background:rgba(0,0,0,.07);color:inherit;
}

/* ── MAIN CONTENT ── */
.main{
  flex:1;
  padding:16px;
  overflow:hidden;
}
.campo-view{display:none}.campo-view.active{display:block}

/* ── ADD SLOT BAR ── */
.add-slot-bar{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;background:#f0f4f8;
  border-radius:10px;margin-bottom:12px;
  flex-wrap:wrap;
}
.add-slot-bar label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#8c8ca4}
.slot-time-input{
  border:none;border-bottom:1.5px solid #1a3a5c;
  background:transparent;font-family:'Manrope',sans-serif;
  font-size:14px;color:#1a3a5c;outline:none;
  width:64px;padding:2px 4px;text-align:center;
}
.slot-time-input:focus{border-bottom-width:2.5px}
.btn-add-slot{
  padding:7px 14px;background:#1a3a5c;color:#fff;
  border:none;border-radius:7px;
  font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:background .15s;white-space:nowrap;
}
.btn-add-slot:hover{background:#142d47}

/* ── TABLE WRAPPER (scroll orizzontale) ── */
.table-wrap{
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  border-radius:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.07);
  background:#fbf9f5;
}
table{
  width:100%;border-collapse:collapse;
  table-layout:fixed;
  min-width:700px;
}
thead th{
  padding:8px 4px;text-align:center;
  font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  border-bottom:2px solid rgba(26,58,92,.12);
  white-space:nowrap;background:#fbf9f5;
  position:sticky;top:0;z-index:2;
}
thead th.th-time{
  width:72px;background:#1a3a5c;color:#fff;
  border-radius:10px 0 0 0;vertical-align:middle;
  position:sticky;left:0;z-index:3;
}
thead th.th-weekend{background:rgba(210,190,150,.07)}
.day-header{display:flex;flex-direction:column;align-items:center;gap:3px;padding:2px 0}
.day-name{font-size:10px;font-weight:700;color:#1a3a5c}
.day-date{
  font-size:11px;font-weight:600;color:#1a3a5c;
  background:rgba(26,58,92,.07);border-radius:4px;
  padding:1px 7px;min-width:44px;text-align:center;
}
.day-date.today{background:#c9a84c;color:#fff}
tbody tr{border-bottom:1px solid rgba(26,58,92,.08)}
tbody td{
  padding:0;border-right:1px solid rgba(26,58,92,.06);
  vertical-align:top;transition:background .15s;
  height:100px;
}
tbody td:last-child{border-right:none}
tbody td.td-time{
  background:#e8edf5;border-right:2px solid rgba(26,58,92,.15);
  text-align:center;vertical-align:middle;position:relative;
  position:sticky;left:0;z-index:1;
}
tbody tr:nth-child(even) td:not(.td-time){background:rgba(26,58,92,.012)}
tbody tr:nth-child(odd) td:not(.td-time){background:#fbf9f5}
tbody td.td-weekend{background:rgba(210,190,150,.06)!important}
tbody td.td-booked{background:rgba(26,58,92,.06)!important;border-left:3px solid #1a3a5c!important}
tbody td.td-booked.sport-tennis{background:rgba(45,125,50,.06)!important;border-left-color:#2d7d32!important}
tbody td.td-booked.sport-calcio{background:rgba(200,75,0,.06)!important;border-left-color:#c84b00!important}
.slot-label{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;color:#1a3a5c;font-weight:700;
  display:block;line-height:1.1;
}
.slot-sub{font-size:9px;color:#8c8ca4;display:block;margin-top:1px}
.btn-del-slot{
  position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  background:none;border:none;cursor:pointer;color:#ccc;
  font-size:12px;padding:2px 5px;border-radius:4px;transition:color .15s;
}
.btn-del-slot:hover{color:#dc3545}

/* ── CELL ── */
.cell{
  padding:5px 6px;height:100%;
  display:flex;flex-direction:column;gap:3px;
}
.cell-booked-tag{
  display:none;font-size:8px;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;color:#fff;background:#1a3a5c;
  border-radius:3px;padding:1px 5px;align-self:flex-start;margin-bottom:1px;
}
.sport-tennis .cell-booked-tag{background:#2d7d32}
.sport-calcio .cell-booked-tag{background:#c84b00}
td.td-booked .cell-booked-tag{display:inline-block}
.cell-row{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.field{display:flex;flex-direction:column;gap:1px}
.fl{font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;color:#bbb;font-weight:700}
.fi{
  border:none;border-bottom:1px solid rgba(26,58,92,.15);
  background:transparent;font-family:'Manrope',sans-serif;
  font-size:11px;color:#1a3a5c;outline:none;
  width:100%;padding:1px 0;transition:border-color .15s;
}
.fi.c-tennis{border-bottom-color:rgba(45,125,50,.25)}
.fi.c-calcio{border-bottom-color:rgba(200,75,0,.25)}
.fi:focus{border-bottom-width:2px;border-bottom-color:#1a3a5c}
.fi.c-tennis:focus{border-bottom-color:#2d7d32}
.fi.c-calcio:focus{border-bottom-color:#c84b00}

/* ── BOTTOM NAV (solo mobile) ── */
.bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:#fbf9f5;
  border-top:1px solid rgba(26,58,92,.1);
  padding: 8px 0;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  z-index:200;
  box-shadow:0 -4px 16px rgba(0,0,0,.08);
}
.bottom-nav-inner{
  display:flex;justify-content:space-around;align-items:center;
}
.bnav-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;cursor:pointer;
  font-family:'Manrope',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;
  color:#aaa;padding:4px 8px;border-radius:8px;
  transition:color .15s;min-width:56px;
}
.bnav-btn .bnav-icon{font-size:20px;line-height:1}
.bnav-btn.padel.active{color:#1a3a5c}
.bnav-btn.tennis.active{color:#2d7d32}
.bnav-btn.calcio.active{color:#c84b00}
.bnav-badge{
  font-size:8px;font-weight:700;padding:0 5px;
  border-radius:8px;background:rgba(0,0,0,.07);
  margin-top:1px;color:inherit;
}

/* ── FOOTER ── */
.footer{
  background:#fbf9f5;
  border-top:1px solid rgba(26,58,92,.08);
  padding:10px 16px;
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:8px;
  font-size:10px;color:#aaa;
}
.footer-stats{display:flex;gap:8px;flex-wrap:wrap}
.stat{
  font-size:10px;font-weight:700;padding:2px 10px;
  border-radius:10px;
}
.stat.padel{background:#e8edf5;color:#1a3a5c}
.stat.tennis{background:#e8f5e9;color:#2d7d32}
.stat.calcio{background:#fff0e6;color:#c84b00}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:max(22px, calc(env(safe-area-inset-bottom) + 70px));right:16px;
  padding:10px 16px;border-radius:8px;
  font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;
  z-index:9999;opacity:0;transform:translateY(8px);
  transition:all .3s;pointer-events:none;max-width:300px;
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:#d1e7dd;color:#0a3622;border:1px solid #a3cfbb}
.toast.info{background:#e8edf5;color:#1a3a5c;border:1px solid #1a3a5c44}
.toast.error{background:#f8d7da;color:#842029;border:1px solid #f1aeb5}

/* ── MODAL prenotazione (mobile tap) ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.45);z-index:500;
  align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal-box{
  background:#fbf9f5;border-radius:18px 18px 0 0;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  width:100%;max-width:500px;
  box-shadow:0 -8px 32px rgba(0,0,0,.15);
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{
  width:36px;height:4px;background:rgba(0,0,0,.15);
  border-radius:2px;margin:0 auto 16px;
}
.modal-title{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;color:#1a3a5c;font-weight:700;
  margin-bottom:14px;
}
.modal-fields{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.modal-field{display:flex;flex-direction:column;gap:4px}
.modal-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#aaa;font-weight:700}
.modal-input{
  border:none;border-bottom:1.5px solid rgba(26,58,92,.2);
  background:transparent;font-family:'Manrope',sans-serif;
  font-size:15px;color:#1a3a5c;outline:none;padding:3px 0;
}
.modal-input:focus{border-bottom-color:#1a3a5c;border-bottom-width:2px}
.modal-actions{display:flex;gap:8px}
.modal-btn{
  flex:1;padding:12px;border:none;border-radius:10px;
  font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .15s;
}
.modal-btn.primary{background:#1a3a5c;color:#fff}
.modal-btn.primary.tennis{background:#2d7d32}
.modal-btn.primary.calcio{background:#c84b00}
.modal-btn.secondary{background:#e9ecef;color:#495057}
.modal-btn.clear{background:#f8d7da;color:#842029}

/* ── RESPONSIVE ── */

/* TABLET (≥768px) */
@media(min-width:768px){
  .app{padding:0}
  .topbar{padding:14px 24px;padding-top:max(14px,env(safe-area-inset-top))}
  .topbar-title{font-size:24px}
  .main{padding:16px 24px}
  tbody td{height:110px}
}

/* DESKTOP (≥1024px) */
@media(min-width:1024px){
  .app{background:#ece7de;padding:20px}
  .topbar{border-radius:14px 14px 0 0}
  .weekbar{padding:12px 28px}
  .tabs-wrap{padding:10px 28px 0}
  .main{padding:20px 28px}
  .footer{padding:12px 28px;border-radius:0 0 14px 14px}
  body{display:flex;align-items:flex-start;justify-content:center;padding:20px}
  .app{border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.13);overflow:hidden;position:relative;background:#fbf9f5}
  tbody td{height:120px}
}

/* MOBILE (≤639px) */
@media(max-width:639px){
  .topbar-sub{display:none}
  .week-inputs .ctrl-group:first-child .ctrl-input{width:90px}
  .ctrl-group:nth-child(2){display:none} /* nasconde Al (domenica) */
  .bottom-nav{display:block}
  .footer{padding-bottom:calc(72px + env(safe-area-inset-bottom))}
  .main{padding:12px;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
  .toast{bottom:max(80px, calc(env(safe-area-inset-bottom) + 76px))}
  /* Su mobile la tabella mostra solo giorno attivo */
  .tabs-wrap{display:none}
  /* week range più corto */
  .week-range{font-size:11px}
  .weekbar{padding:8px 12px;gap:6px}
}

/* PRINT */
@media print{
  .topbar,.weekbar,.tabs-wrap,.footer,.add-slot-bar,.btn-del-slot,.bottom-nav,.modal-overlay{display:none!important}
  .campo-view{display:block!important}
  body,html,.app{background:#fff}
  .table-wrap{box-shadow:none;border-radius:0}
  tbody td{height:80px}
}
</style>
</head>
<body>
<div class="app">

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-brand">
    <div class="topbar-title">&#127�; Registro Campi</div>
    <div class="topbar-sub">Padel · Tennis · Calcio — Settimanale</div>
  </div>
  <div class="topbar-actions">
    <span class="status-pill idle" id="status-bar">Pronto</span>
    <button class="icon-btn" onclick="window.print()" title="Stampa">🖨</button>
    <button class="icon-btn danger" onclick="clearAllConfirm()" title="Svuota">🗑</button>
    <button class="icon-btn accent" onclick="saveAll()" title="Salva" id="btn-save">💾</button>
  </div>
</header>

<!-- WEEK BAR -->
<div class="weekbar">
  <div class="week-nav-group">
    <button class="week-btn" onclick="navWeek(-1)" title="Settimana precedente">&#8592;</button>
    <button class="week-btn today-btn" onclick="goToCurrentWeek()">OGGI</button>
    <span class="week-range" id="week-range">—</span>
    <button class="week-btn" onclick="navWeek(1)" title="Settimana successiva">&#8594;</button>
  </div>
  <div class="week-inputs">
    <div class="ctrl-group">
      <span class="ctrl-label">Dal (Lun)</span>
      <input class="ctrl-input" id="date-from" type="text" placeholder="gg/mm/aaaa" autocomplete="off" maxlength="10" inputmode="numeric">
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Al (Dom)</span>
      <input class="ctrl-input" id="date-to" type="text" placeholder="—" readonly>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Responsabile</span>
      <input class="ctrl-input" id="responsabile" type="text" placeholder="Nome..." style="width:110px">
    </div>
  </div>
  <span class="sync-badge" id="sync-info"></span>
</div>

<!-- TABS (desktop/tablet) -->
<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab-btn padel active" id="tab-padel1" onclick="showCampo('padel1')">🎾 Padel 1 <span class="badge" id="cnt-padel1">0</span></button>
    <button class="tab-btn padel" id="tab-padel2" onclick="showCampo('padel2')">🎾 Padel 2 <span class="badge" id="cnt-padel2">0</span></button>
    <button class="tab-btn tennis" id="tab-tennis1" onclick="showCampo('tennis1')">🎾 Tennis 1 <span class="badge" id="cnt-tennis1">0</span></button>
    <button class="tab-btn tennis" id="tab-tennis2" onclick="showCampo('tennis2')">🎾 Tennis 2 <span class="badge" id="cnt-tennis2">0</span></button>
    <button class="tab-btn calcio" id="tab-calcio" onclick="showCampo('calcio')">⚽ Calcio <span class="badge" id="cnt-calcio">0</span></button>
  </div>
</div>

<!-- MAIN -->
<main class="main">
  <div id="views-container"></div>
</main>

<!-- FOOTER -->
<footer class="footer">
  <span id="footer-info" style="font-size:10px">Nessuna settimana selezionata</span>
  <div class="footer-stats">
    <span class="stat padel" id="stat-padel">Padel: 0</span>
    <span class="stat tennis" id="stat-tennis">Tennis: 0</span>
    <span class="stat calcio" id="stat-calcio">Calcio: 0</span>
  </div>
</footer>

<!-- BOTTOM NAV (mobile) -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="bnav-btn padel active" id="bnav-padel1" onclick="showCampo('padel1')">
      <span class="bnav-icon">🎾</span>Padel 1<span class="bnav-badge" id="bcnt-padel1">0</span>
    </button>

<script>
// ── SUPABASE ────────────────────────────────────────────────────────────
const SB_URL='https://xjucqvcbhknfdyjtdwbr.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqdWNxdmNiaGtuZmR5anRkd2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMzg4OTgsImV4cCI6MjA5NTYxNDg5OH0.uitw5FUJx1XmDsBpjdS6u2DV2qUpqMPbzktlkW4BGpY';
const TABLE='prenotazioni_settimane';
async function sbFetch(path,opts={}){
  const res=await fetch(SB_URL+'/rest/v1/'+path,{
    ...opts,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'',...(opts.headers||{})}
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const t=await res.text();return t?JSON.parse(t):null;
}
async function dbLoad(key){
  const r=await sbFetch(`${TABLE}?id=eq.${encodeURIComponent(key)}&select=*`);
  return r&&r.length?r[0]:null;
}
async function dbSave(payload){
  await sbFetch(TABLE,{method:'POST',prefer:'resolution=merge-duplicates',headers:{'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(payload)});
}

// ── COSTANTI ──────────────────────────────────────────────────────────
const CAMPI=['padel1','padel2','tennis1','tennis2','calcio'];
const SPORT={padel1:'padel',padel2:'padel',tennis1:'tennis',tennis2:'tennis',calcio:'calcio'};
const DAYS=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const DAYS_FULL=['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];
const WEEKEND=[5,6];
const FIELDS=['nome','tel','istr','importo'];
const DEFAULT_SLOTS=['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'];
let campoSlots={};
CAMPI.forEach(c=>{campoSlots[c]=[...DEFAULT_SLOTS];});
let isMobile=()=>window.innerWidth<640;

// ── MOBILE MODAL state ────────────────────────────────────────────────
let _modalCell=null;
function openModal(cell){
  _modalCell=cell;
  const campo=cell.dataset.campo,slot=cell.dataset.slot,day=cell.dataset.day;
  const sport=SPORT[campo];
  const dayDate=document.querySelector(`#view-${campo} .day-date[data-day-idx="${day}"]`)?.textContent||'';
  document.getElementById('modal-title').textContent=`${slot} — ${DAYS_FULL[day]} ${dayDate}`;
  FIELDS.forEach(f=>{document.getElementById('m-'+f).value=cell.querySelector('.fi-'+f)?.value||'';});
  const btn=document.getElementById('modal-save-btn');
  btn.className='modal-btn primary'+(sport!=='padel'?' '+sport:'');
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-nome').focus(),100);
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  _modalCell=null;
}
function closeModalOnOverlay(e){
  if(e.target===document.getElementById('modal-overlay'))closeModal();
}
function clearModal(){
  FIELDS.forEach(f=>{document.getElementById('m-'+f).value='';});
}
function saveModal(){
  if(!_modalCell)return;
  FIELDS.forEach(f=>{
    const inp=_modalCell.querySelector('.fi-'+f);
    if(inp)inp.value=document.getElementById('m-'+f).value;
  });
  refreshCellState(_modalCell);
  updateCounters();
  closeModal();
  showToast('✅ Prenotazione salvata','success');
}

// ── DATE UTILS ────────────────────────────────────────────────────────
function parseIT(str){
  if(!str)return null;
  const p=str.trim().split('/');
  if(p.length!==3)return null;
  const dt=new Date(+p[2],+p[1]-1,+p[0]);
  return isNaN(dt)?null:dt;
}
function fmtIT(dt){return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0')+'/'+dt.getFullYear();}
function fmtShort(dt){return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0');}
function getMondayOf(d){
  const dt=new Date(d);dt.setHours(0,0,0,0);
  const day=dt.getDay();dt.setDate(dt.getDate()+(day===0?-6:1-day));return dt;
}
function todayMidnight(){const d=new Date();d.setHours(0,0,0,0);return d;}

// ── TIME UTILS ────────────────────────────────────────────────────────
function normalizeTime(str){
  str=str.trim().replace(/[.,]/g,':');
  let h,m='00';
  if(str.includes(':')){[h,m]=str.split(':');}
  else if(str.length<=2){h=str;}
  else{h=str.slice(0,-2);m=str.slice(-2);}
  h=parseInt(h);m=parseInt(m);
  if(isNaN(h)||isNaN(m)||h<0||h>23||m<0||m>59)return null;
  return h.toString().padStart(2,'0')+':'+m.toString().padStart(2,'0');
}
function nextHour(t){
  const[h,m]=t.split(':').map(Number);
  return((h+1)%24).toString().padStart(2,'0')+':'+m.toString().padStart(2,'0');
}
function slotKey(t){return t.replace(':','');}

// ── KEYS ──────────────────────────────────────────────────────────────
function weekKey(s){return s?'rc_'+s.replace(/\//g,'_'):null;}
function currentWeekKey(){return weekKey(document.getElementById('date-from').value.trim());}

// ── META / HEADER (no render) ─────────────────────────────────────────
function syncWeekMeta(from){
  if(!from){
    document.getElementById('date-to').value='';
    document.getElementById('week-range').textContent='—';
    document.getElementById('footer-info').textContent='Nessuna settimana selezionata';
    return;
  }
  const sun=new Date(from);sun.setDate(from.getDate()+6);
  document.getElementById('date-to').value=fmtIT(sun);
  document.getElementById('week-range').textContent=fmtShort(from)+' – '+fmtShort(sun);
  document.getElementById('footer-info').textContent=`Sett. ${fmtIT(from)} – ${fmtIT(sun)}  ·  ${document.getElementById('responsabile').value||'—'}`;
}
function refreshDateHeaders(from){
  const today=todayMidnight();
  CAMPI.forEach(campo=>{
    const view=document.getElementById('view-'+campo);if(!view)return;
    view.querySelectorAll('.day-date[data-day-idx]').forEach(el=>{
      const i=parseInt(el.dataset.dayIdx);
      if(!from){el.textContent='—';el.classList.remove('today');return;}
      const d=new Date(from);d.setDate(from.getDate()+i);
      el.textContent=fmtShort(d);
      el.classList.toggle('today',d.getTime()===today.getTime());
    });
  });
}

// ── RENDER CAMPO ──────────────────────────────────────────────────────
function renderCampo(campo){
  const sport=SPORT[campo],cc=sport==='padel'?'':'c-'+sport,slots=campoSlots[campo];
  let html=`<div class="add-slot-bar">
    <label>Orario:</label>
    <input class="slot-time-input" id="nss-${campo}" placeholder="09:30" maxlength="5" inputmode="numeric">
    <span style="color:#ccc;font-size:12px">→</span>
    <input class="slot-time-input" id="nse-${campo}" placeholder="11:00" maxlength="5" inputmode="numeric">
    <button class="btn-add-slot" onclick="addSlot('${campo}')">+ Aggiungi</button>
  </div><div class="table-wrap"><table><thead><tr><th class="th-time">Orario</th>`;
  DAYS.forEach((d,i)=>{
    const wk=WEEKEND.includes(i)?' th-weekend':'';
    html+=`<th class="th-day${wk}"><div class="day-header"><span class="day-name">${d}</span><span class="day-date" data-day-idx="${i}">—</span></div></th>`;
  });
  html+=`</tr></thead><tbody>`;
  if(!slots.length){
    html+=`<tr><td colspan="8" style="text-align:center;color:#aaa;font-size:12px;padding:24px">Aggiungi slot orari sopra</td></tr>`;
  }else{
    slots.forEach(slot=>{
      html+=`<tr><td class="td-time"><span class="slot-label">${slot}</span><span class="slot-sub">↓${nextHour(slot)}</span><button class="btn-del-slot" onclick="removeSlot('${campo}','${slot}')" title="Rimuovi">✕</button></td>`;
      DAYS.forEach((_,di)=>{
        const wkc=WEEKEND.includes(di)?' td-weekend':'';
        html+=`<td class="${wkc}" id="td-${campo}-${slotKey(slot)}-${di}"><div class="cell" data-campo="${campo}" data-slot="${slot}" data-day="${di}"><span class="cell-booked-tag">Prenotato</span><div class="cell-row"><div class="field"><span class="fl">Nome</span><input class="fi ${cc} fi-nome" type="text" placeholder="—" autocomplete="off"></div><div class="field"><span class="fl">Tel</span><input class="fi ${cc} fi-tel" type="tel" placeholder="—" autocomplete="off"></div></div><div class="cell-row"><div class="field"><span class="fl">Istr.</span><input class="fi ${cc} fi-istr" type="text" placeholder="—" autocomplete="off"></div><div class="field"><span class="fl">€</span><input class="fi ${cc} fi-importo" type="text" placeholder="—" autocomplete="off"></div></div></div></td>`;
      });
      html+=`</tr>`;
    });
  }
  html+=`</tbody></table></div>`;
  const view=document.getElementById('view-'+campo);
  view.innerHTML=html;
  // listeners desktop
  view.querySelectorAll('.fi').forEach(inp=>{
    inp.addEventListener('input',()=>{refreshCellState(inp.closest('.cell'));updateCounters();});
  });
  // listeners mobile: tap su cella apre modal
  view.querySelectorAll('.cell').forEach(cell=>{
    cell.addEventListener('click',e=>{
      if(!isMobile())return;
      if(e.target.tagName==='INPUT')return;
      openModal(cell);
    });
    // touch feedback
    cell.addEventListener('touchstart',()=>cell.style.background='rgba(26,58,92,.04)',{passive:true});
    cell.addEventListener('touchend',()=>cell.style.background='',{passive:true});
  });
  const si=document.getElementById('nss-'+campo),ei=document.getElementById('nse-'+campo);
  if(si)si.addEventListener('keydown',e=>{if(e.key==='Enter')ei&&ei.focus();});
  if(ei)ei.addEventListener('keydown',e=>{if(e.key==='Enter')addSlot(campo);});
}
function renderAllCampi(){CAMPI.forEach(renderCampo);}
function buildViews(){
  const c=document.getElementById('views-container');
  CAMPI.forEach((campo,ci)=>{
    const div=document.createElement('div');
    div.className='campo-view'+(ci===0?' active':'');
    div.id='view-'+campo;
    c.appendChild(div);
  });
  renderAllCampi();
}

// ── ADD / REMOVE SLOT ──────────────────────────────────────────────
function addSlot(campo){
  const si=document.getElementById('nss-'+campo),ei=document.getElementById('nse-'+campo);
  const start=normalizeTime(si.value);
  if(!start){showToast('⚠️ Orario non valido','error');si.focus();return;}
  if(campoSlots[campo].includes(start)){showToast('ℹ️ '+start+' già presente','info');return;}
  const end=ei.value.trim()?normalizeTime(ei.value):nextHour(start);
  const existing=collectCampoData(campo);
  const from=parseIT(document.getElementById('date-from').value.trim());
  campoSlots[campo].push(start);campoSlots[campo].sort();
  renderCampo(campo);restoreCampoData(campo,existing);refreshDateHeaders(from);updateCounters();
  si.value='';ei.value='';si.focus();
  showToast('✅ Slot '+start+' → '+(end||nextHour(start))+' aggiunto','success');
}
function removeSlot(campo,slot){
  if(!confirm(`Rimuovere slot ${slot}?\nI dati andranno persi.`))return;
  const existing=collectCampoData(campo);
  const from=parseIT(document.getElementById('date-from').value.trim());
  campoSlots[campo]=campoSlots[campo].filter(s=>s!==slot);
  renderCampo(campo);
  const filtered=Object.fromEntries(Object.entries(existing).filter(([k])=>!k.startsWith(`${campo}||${slot}||`)));
  restoreCampoData(campo,filtered);refreshDateHeaders(from);updateCounters();
  showToast('🗑 Slot '+slot+' rimosso','info');
}

// ── COLLECT / RESTORE ────────────────────────────────────────────────
function collectCampoData(campo){
  const data={};
  document.querySelectorAll(`.cell[data-campo="${campo}"]`).forEach(cell=>{
    const k=`${cell.dataset.campo}||${cell.dataset.slot}||${cell.dataset.day}`;
    const entry={};FIELDS.forEach(f=>{entry[f]=cell.querySelector('.fi-'+f)?.value||'';});
    if(FIELDS.some(f=>entry[f]))data[k]=entry;
  });return data;
}
function restoreCampoData(campo,data){
  Object.entries(data).forEach(([k,v])=>{
    const[c,slot,day]=k.split('||');if(c!==campo)return;
    const cell=document.querySelector(`.cell[data-campo="${c}"][data-slot="${slot}"][data-day="${day}"]`);
    if(!cell)return;
    FIELDS.forEach(f=>{const inp=cell.querySelector('.fi-'+f);if(inp)inp.value=v[f]||'';});
    refreshCellState(cell);
  });
}
function restoreAllData(slots){
  if(!slots)return;
  Object.entries(slots).forEach(([k,v])=>{
    const[campo,slot,day]=k.split('||');
    const cell=document.querySelector(`.cell[data-campo="${campo}"][data-slot="${slot}"][data-day="${day}"]`);
    if(!cell)return;
    FIELDS.forEach(f=>{const inp=cell.querySelector('.fi-'+f);if(inp)inp.value=v[f]||'';});
    refreshCellState(cell);
  });
}

// ── CELL STATE ────────────────────────────────────────────────────────
function refreshCellState(cell){
  if(!cell)return;
  const td=cell.closest('td');if(!td)return;
  const sport=SPORT[cell.dataset.campo];
  const nome=cell.querySelector('.fi-nome')?.value?.trim();
  td.classList.remove('td-booked','sport-tennis','sport-calcio');
  if(nome){td.classList.add('td-booked');if(sport!=='padel')td.classList.add('sport-'+sport);}
}

// ── TAB SWITCH ────────────────────────────────────────────────────────
function showCampo(campo){
  document.querySelectorAll('.campo-view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+campo).classList.add('active');
  const tb=document.getElementById('tab-'+campo);if(tb)tb.classList.add('active');
  const bb=document.getElementById('bnav-'+campo);if(bb)bb.classList.add('active');
}

// ── SAVE ─────────────────────────────────────────────────────────────
async function saveAll(){
  const key=currentWeekKey();
  if(!key){showToast('⚠️ Inserisci la data di inizio settimana','error');return;}
  const btn=document.getElementById('btn-save'),bar=document.getElementById('status-bar');
  btn.disabled=true;bar.className='status-pill saving';bar.textContent='Salvataggio...';
  try{
    const payload={id:key,date_from:document.getElementById('date-from').value.trim(),date_to:document.getElementById('date-to').value,responsabile:document.getElementById('responsabile').value,campo_slots:campoSlots,slots:{}};
    document.querySelectorAll('.cell').forEach(cell=>{
      const k=`${cell.dataset.campo}||${cell.dataset.slot}||${cell.dataset.day}`;
      const entry={};FIELDS.forEach(f=>{entry[f]=cell.querySelector('.fi-'+f)?.value||'';});
      if(FIELDS.some(f=>entry[f]))payload.slots[k]=entry;
    });
    await dbSave(payload);
    bar.className='status-pill saved';bar.textContent='✓ Salvato';
    const now=new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('sync-info').textContent='☁️ '+now;
    showToast('✅ Sincronizzato!','success');
    setTimeout(()=>{bar.className='status-pill idle';bar.textContent='Pronto';},3000);
  }catch(e){
    bar.className='status-pill error';bar.textContent='Errore!';
    showToast('❌ '+e.message,'error');
  }finally{btn.disabled=false;}
}

// ── LOAD ──────────────────────────────────────────────────────────────
async function loadWeekData(key){
  if(!key)return false;
  try{
    const data=await dbLoad(key);
    if(!data)return false;
    if(data.date_from)document.getElementById('date-from').value=data.date_from;
    if(data.responsabile)document.getElementById('responsabile').value=data.responsabile;
    if(data.campo_slots)CAMPI.forEach(c=>{if(data.campo_slots[c])campoSlots[c]=[...data.campo_slots[c]];});
    renderAllCampi();
    const from=parseIT(document.getElementById('date-from').value.trim());
    refreshDateHeaders(from);syncWeekMeta(from);
    restoreAllData(data.slots);updateCounters();
    if(data.updated_at){
      const upd=new Date(data.updated_at).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      document.getElementById('sync-info').textContent='☁️ '+upd;
    }
    return true;
  }catch(e){console.error(e);showToast('❌ Errore caricamento','error');return false;}
}

// ── CLEAR ─────────────────────────────────────────────────────────────
function clearInputs(){
  document.querySelectorAll('.fi').forEach(i=>i.value='');
  document.querySelectorAll('td.td-booked').forEach(td=>td.classList.remove('td-booked','sport-tennis','sport-calcio'));
  updateCounters();
}
function clearAllConfirm(){
  if(!confirm('Svuotare tutti i dati?\n(Gli orari personalizzati vengono mantenuti.)'))return;
  clearInputs();showToast('🗑 Foglio svuotato','info');
}

// ── SWITCH SETTIMANA ──────────────────────────────────────────────────
async function switchToWeek(fromStr){
  CAMPI.forEach(c=>{campoSlots[c]=[...DEFAULT_SLOTS];});
  clearInputs();
  document.getElementById('date-from').value=fromStr;
  document.getElementById('sync-info').textContent='';
  const bar=document.getElementById('status-bar');
  bar.className='status-pill loading';bar.textContent='⏳...';
  const found=await loadWeekData(weekKey(fromStr));
  if(!found){
    renderAllCampi();
    const from=parseIT(fromStr);
    refreshDateHeaders(from);syncWeekMeta(from);updateCounters();
  }
  bar.className='status-pill idle';bar.textContent='Pronto';
  showToast(found?'📂 '+fromStr:'📋 Nuova: '+fromStr,found?'success':'info');
}
function goToCurrentWeek(){switchToWeek(fmtIT(getMondayOf(new Date())));}
function navWeek(dir){
  const from=parseIT(document.getElementById('date-from').value.trim());
  if(!from){showToast('⚠️ Inserisci una data','error');return;}
  const next=new Date(from);next.setDate(from.getDate()+dir*7);
  switchToWeek(fmtIT(next));
}

// ── COUNTERS ──────────────────────────────────────────────────────────
function updateCounters(){
  const c={padel1:0,padel2:0,tennis1:0,tennis2:0,calcio:0};
  document.querySelectorAll('.cell').forEach(cell=>{
    if(cell.querySelector('.fi-nome')?.value?.trim())c[cell.dataset.campo]++;
  });
  CAMPI.forEach(campo=>{
    const el=document.getElementById('cnt-'+campo);if(el)el.textContent=c[campo]||'0';
    const bel=document.getElementById('bcnt-'+campo);if(bel)bel.textContent=c[campo]||'0';
  });
  document.getElementById('stat-padel').textContent=`Padel: ${c.padel1+c.padel2}`;
  document.getElementById('stat-tennis').textContent=`Tennis: ${c.tennis1+c.tennis2}`;
  document.getElementById('stat-calcio').textContent=`Calcio: ${c.calcio}`;
}

// ── TOAST ─────────────────────────────────────────────────────────────
function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),3200);
}

// ── INPUT HANDLERS ────────────────────────────────────────────────────
let _deb;
document.getElementById('date-from').addEventListener('input',function(){
  clearTimeout(_deb);
  _deb=setTimeout(()=>{
    const val=this.value.trim();
    if(val.length===10&&parseIT(val))switchToWeek(val);
    else{const from=parseIT(val);syncWeekMeta(from||null);refreshDateHeaders(from||null);}
  },600);
});
document.getElementById('responsabile').addEventListener('input',()=>{
  syncWeekMeta(parseIT(document.getElementById('date-from').value.trim())||null);
});

// ── AUTO-SAVE ─────────────────────────────────────────────────────────
setInterval(()=>{
  const key=currentWeekKey();if(!key)return;
  if([...document.querySelectorAll('.fi-nome')].some(i=>i.value.trim()))saveAll();
},60000);

// ── SWIPE to navigate weeks (mobile) ─────────────────────────────────
let _tx=0;
document.querySelector('.main').addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;},{passive:true});
document.querySelector('.main').addEventListener('touchend',e=>{
  if(!isMobile())return;
  const dx=e.changedTouches[0].clientX-_tx;
  if(Math.abs(dx)>70)navWeek(dx<0?1:-1);
},{passive:true});

// ── INIT ──────────────────────────────────────────────────────────────
buildViews();
updateCounters();
goToCurrentWeek();
</script>
